[package]
name = "gwenland-tui"
version = "1.0.0"
edition = "2024"

[features]
default = []
gui = ["dep:gwenland-gui"]

[[bin]]
name = "gwenland"
path = "src/main.rs"

[dependencies]
gwenland-core = { path = "../core" }
serde_json = "1"
clap = { version = "4", features = ["derive"] }
ratatui = "0.30"
crossterm = "0.28"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json", "stream", "blocking"] }
reqwest-eventsource = "0.6"
futures-util = "0.3"
atty = "0.2"
dirs = "5"
flate2 = "1"
tar = "0.4"
zip = "2"
chrono = "0.4"
inquire = "0.7"
indicatif = "0.17"
sha2 = "0.10"
serde = { version = "1.0", features = ["derive"] }
anyhow = "1"
tempfile = "3"
keyring = "3"
gwenland-gui = { path = "../gui/src-tauri", optional = true }

[dev-dependencies]
# Integration-test helpers — not shipped in release binaries.
# tokio/reqwest/etc. are already in [dependencies] so Cargo deduplicates them;
# listing them here pins the feature set used in tests.
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json", "stream"] }
reqwest-eventsource = "0.6"
futures-util = "0.3"
serde_json = "1"

# Declares the integration test binary so `cargo test --test serve_chat_test` works
[[test]]
name = "serve_chat_test"
path = "tests/integration/serve_chat_test.rs"
harness = true

[build-dependencies]
vergen = { version = "8", features = ["git", "gitcl"] }
serde_json = "1"

[profile.release]
opt-level = "z"
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true

[profile.dev]
opt-level = 1