[package]
name = "gltui"
version = "0.1.48"
edition = "2024"
license-file = "../../LICENSE"

[features]
default = []

[[bin]]
name = "gltui"
path = "src/main.rs"

[dependencies]
gwenland-core = { path = "../core" }
serde_json = "1"
clap = { version = "4", features = ["derive"] }
ratatui = "0.29.0"
crossterm = "0.28"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json", "stream", "blocking"] }
reqwest-eventsource = { version = "0.6", default-features = false }
futures-util = "0.3"
atty = "0.2"
dirs = "5"
flate2 = "1"
tar = "0.4"
zip = "2"
chrono = "0.4"
inquire = "0.7"
indicatif = "0.17"
sha2 = "0.10"
serde = { version = "1.0", features = ["derive"] }
anyhow = "1"
tempfile = "3"
keyring = "3"
tui-textarea = "0.7"
toml = "0.8"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
# Integration-test helpers — not shipped in release binaries.
# tokio/reqwest/etc. are already in [dependencies] so Cargo deduplicates them;
# listing them here pins the feature set used in tests.
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json", "stream"] }
reqwest-eventsource = { version = "0.6", default-features = false }
futures-util = "0.3"
serde_json = "1"

# Declares the integration test binary so `cargo test --test serve_chat_test` works
[[test]]
name = "serve_chat_test"
path = "tests/integration/serve_chat_test.rs"
harness = true

[build-dependencies]
vergen = { version = "8", features = ["git", "gitcl"] }
serde_json = "1"

[profile.release]
opt-level = "z"
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true

[profile.dev]
opt-level = 1