# =============================================================================
# GwenLand — E2E Serve + Chat Integration Tests
# =============================================================================
# Tests the full serve → health-check → SSE-stream → teardown pipeline.
#
# What runs:
#   cargo test --test serve_chat_test (3 test cases):
#     A. test_serve_subprocess_teardown  — binary spawns, exits cleanly, no zombie
#     B. test_proxy_sse_stream           — fake upstream + real SSE parse
#     C. test_serve_health_chat_sigterm  — health poll + optional live chat + SIGTERM
#
# Architecture:
#   - Tests B & C do NOT require mistralrs-server to be installed.
#     B uses a real in-process HTTP server (no mock framework).
#     C detects the missing binary and passes via the expected-exit path.
#   - If mistralrs IS available (optional), test C also streams live tokens.
#
# Triggers:
#   - Push to main
#   - Pull requests targeting main
#
# @EDITABLE: Test timeout — controlled by tokio timeout inside each test (30 s / 60 s).
# @EDITABLE: Port — free_port() picks a random ephemeral port at runtime.
# @DANGER:   Never remove --test serve_chat_test from the cargo test invocation;
#            running all tests would include TUI tests that require a terminal.
# =============================================================================

name: E2E Serve + Chat

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  serve-chat-e2e:
    name: E2E Serve+Chat (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: true
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    defaults:
      run:
        working-directory: .

    steps:
      # =======================================================================
      # 1. Checkout
      # =======================================================================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =======================================================================
      # 2. Rust toolchain
      # =======================================================================
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # =======================================================================
      # 3. Cache — Cargo registry + build artifacts
      #    Key: ${{ runner.os }}-gwen-${{ hashFiles('**/Cargo.lock') }}
      # =======================================================================
      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            gwen-cli/target/
          key: ${{ runner.os }}-gwen-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-gwen-

      # =======================================================================
      # 4. (Linux only) System dependencies — required by gwen-core (wgpu/Vulkan)
      # =======================================================================
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            pkg-config \
            libvulkan-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev

      # =======================================================================
      # 5. Build gwenland-tui release binary
      #    The integration test locates the binary via CARGO_MANIFEST_DIR +
      #    target/release/gwenland — it must be built before tests run.
      # =======================================================================
      - name: Build gwenland-tui (release)
        run: cargo build --release -p gwenland-tui
        shell: bash
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true
          OPENSSL_STATIC: 1
          OPENSSL_VENDOR: 1

      # =======================================================================
      # 6. Run integration tests
      #    --test serve_chat_test        → only the integration test binary
      #    --no-fail-fast                → run all 3 sub-tests, report all failures
      #    RUST_LOG=info                 → surface serve/proxy logs in CI output
      #    RUST_BACKTRACE=1              → full backtraces on panic
      #
      #    Total timeout: 60 s per test × 3 tests = 180 s max.
      #    Individual timeouts are enforced inside each test via tokio::time::timeout.
      # =======================================================================
      - name: Run serve+chat integration tests
        run: |
          cargo test \
            --release \
            -p gwenland-tui \
            --test serve_chat_test \
            -- \
            --nocapture
        shell: bash
        timeout-minutes: 10       # Hard CI ceiling — kills stuck runner after 10 min
        env:
          RUST_LOG: info
          RUST_BACKTRACE: 1
          # Ensure no terminal is detected (forces non-interactive code paths)
          TERM: dumb
