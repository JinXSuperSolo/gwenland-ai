[package]
name    = "gwenland-gui"
version = "1.0.0"
edition = "2024"

# Required for mobile builds and so main.rs can call the lib's run().
[lib]
name       = "gwen_gui_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri               = { version = "2", features = [] }
tauri-plugin-fs     = "2"
tauri-plugin-shell  = "2"
tauri-plugin-dialog = "2"
serde      = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
opt-level     = "z"
lto           = true
codegen-units = 1
panic         = "abort"
strip         = true
