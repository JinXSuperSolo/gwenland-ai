# =============================================================================
# GwenLand — Cross-Platform Build Pipeline
# =============================================================================
# Builds the gwenland binary for 5 targets across Windows, macOS, and Linux.
# Uses native runners where possible and `cross` for Linux ARM64.
#
# Triggers:
#   - Push to main
#   - Pull requests targeting main
#   - Manual dispatch
#   - Tagged releases (v*) also publish binaries to GitHub Releases
# =============================================================================

name: Build GwenLand Binaries

on:
  push:
    branches: [main]
    tags: ["v*"]            # Also triggers on version tags for releases
  pull_request:
    branches: [main]
  workflow_dispatch:        # Manual trigger from GitHub UI

# Cancel redundant runs on the same branch/PR (saves runner minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Permissions needed for creating releases and uploading assets
permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Shared Rust toolchain version — pin for reproducibility
  RUST_TOOLCHAIN: stable

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false      # Don't cancel other builds if one fails
      matrix:
        include:
          # ---------------------------------------------------------------
          # Windows x64 — native MSVC runner
          # ---------------------------------------------------------------
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: gwenland-win-x64.exe
            binary_path: target/x86_64-pc-windows-msvc/release/gwenland.exe
            use_cross: false

          # ---------------------------------------------------------------
          # macOS ARM64 (Apple Silicon) — native M-series runner
          # ---------------------------------------------------------------
          - name: macOS ARM64
            os: macos-latest        # macos-latest is ARM64 (M-series)
            target: aarch64-apple-darwin
            artifact_name: gwenland-mac-arm64
            binary_path: target/aarch64-apple-darwin/release/gwenland
            use_cross: false

          # ---------------------------------------------------------------
          # macOS x64 (Intel) — uses macos-13 which is the last Intel runner
          # ---------------------------------------------------------------
          - name: macOS x64
            os: macos-13
            target: x86_64-apple-darwin
            artifact_name: gwenland-mac-x64
            binary_path: target/x86_64-apple-darwin/release/gwenland
            use_cross: false

          # ---------------------------------------------------------------
          # Linux x64 — native Ubuntu runner
          # ---------------------------------------------------------------
          - name: Linux x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: gwenland-linux-x64
            binary_path: target/x86_64-unknown-linux-gnu/release/gwenland
            use_cross: false

          # ---------------------------------------------------------------
          # Linux ARM64 — uses `cross` for cross-compilation in Docker
          # ---------------------------------------------------------------
          - name: Linux ARM64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: gwenland-linux-arm64
            binary_path: target/aarch64-unknown-linux-gnu/release/gwenland
            use_cross: true

    steps:
      # =====================================================================
      # 1. Checkout source code
      # =====================================================================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =====================================================================
      # 2. Install Rust toolchain with the required target
      # =====================================================================
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      # =====================================================================
      # 3. Cache Cargo registry, index, and build artifacts
      #    Key includes the target so each platform gets its own cache.
      # =====================================================================
      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.target }}-

      # =====================================================================
      # 4. (Linux only) Install system dependencies for wgpu / Vulkan
      #    gwen-core depends on wgpu which needs GPU-related headers to build.
      # =====================================================================
      - name: Install Linux system dependencies
        if: runner.os == 'Linux' && !matrix.use_cross
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libvulkan-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev

      # =====================================================================
      # 5. Install `cross` for Linux ARM64 cross-compilation
      #    `cross` uses Docker containers with pre-configured toolchains.
      # =====================================================================
      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross --force
      
      # =====================================================================
      # 6. Build the binary in release mode
      #    Uses `cross` for ARM64 Linux, `cargo` for everything else.
      #    --target ensures the output goes to target/<triple>/release/.
      # =====================================================================
      - name: Build release binary
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --package gwenland-tui
          else
            cargo build --release --target ${{ matrix.target }} --package gwenland-tui
          fi
        shell: bash
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true
          OPENSSL_STATIC: 1
          OPENSSL_VENDOR: 1

      # =====================================================================
      # 7. Prepare dist/ folder and rename binary to the canonical name
      # =====================================================================
      - name: Prepare dist output
        run: |
          mkdir -p dist
          cp "${{ matrix.binary_path }}" "dist/${{ matrix.artifact_name }}"
        shell: bash

      # =====================================================================
      # 8. Upload the binary as a GitHub Actions artifact
      #    Available for download from the Actions run summary page.
      # =====================================================================
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          retention-days: 30       # Keep artifacts for 30 days
          if-no-files-found: error # Fail loudly if the binary is missing

  # ===========================================================================
  # Release Job — only runs on version tags (v*)
  # Collects all artifacts and attaches them to a GitHub Release.
  # ===========================================================================
  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      # Download ALL artifacts from the build job into ./artifacts/
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false    # Each artifact in its own subdirectory

      # Collect all binaries into a flat release/ directory
      - name: Collect release binaries
        run: |
          mkdir -p release
          # Each artifact is in artifacts/<name>/<name>, flatten them
          find artifacts -type f -exec cp {} release/ \;
          echo "📦 Release contents:"
          ls -lh release/

      # Create the GitHub Release and upload all binaries
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true   # Auto-generate changelog from commits
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
