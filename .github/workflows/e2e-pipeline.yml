# =============================================================================
# GwenLand — End-to-End Pipeline Integration Test
# =============================================================================
# Runs the full gwen pipeline:
#   fetch → dataset validate → scan → train (dry-run, 5-step cap) → hub push (dry-run)
#
# Triggers:
#   - Push to main
#   - Pull requests targeting main
#
# Model: tinyllama/TinyLlama-1.1B  (small, fast, CI-friendly)
# Fixture: tests/fixtures/sample_100.jsonl
#
# DANGER: Train step uses --dry-run to enforce the 5-step cap.
#         Never remove --dry-run from the train step.
#
# @EDITABLE: HF_TOKEN — set via GitHub Actions secret: secrets.HF_TOKEN
# @EDITABLE: Cache key — ${{ runner.os }}-gwen-${{ hashFiles('**/Cargo.lock') }}
# =============================================================================

name: E2E Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel redundant runs on the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # HF_TOKEN is read by gwen fetch and gwen hub commands via HF_TOKEN env var
  HF_TOKEN: ${{ secrets.HF_TOKEN }}

jobs:
  e2e:
    name: E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: true          # Exit on first failure — pipeline is sequential
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    defaults:
      run:
        working-directory: gwen-cli

    steps:
      # =========================================================================
      # 1. Checkout
      # =========================================================================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================================================================
      # 2. Rust toolchain
      # =========================================================================
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # =========================================================================
      # 3. Cache — Cargo registry + build artifacts + HuggingFace model cache
      #    Key: runner OS + Cargo.lock hash for reproducible restores.
      #    HF cache avoids re-downloading the model on every run.
      # =========================================================================
      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            gwen-cli/target/
          key: ${{ runner.os }}-gwen-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-gwen-

      - name: Cache HuggingFace model downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/
          key: ${{ runner.os }}-hf-tinyllama-1.1b-q4km
          restore-keys: |
            ${{ runner.os }}-hf-tinyllama-

      # =========================================================================
      # 4. (Linux only) System dependencies required by gwen-core (wgpu/Vulkan)
      # =========================================================================
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libvulkan-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxi-dev

      # =========================================================================
      # 5. Build gwenland-tui in release mode
      #    -p tui builds only the tui package (skips gui which is not in workspace).
      # =========================================================================
      - name: Build gwenland-tui (release)
        run: cargo build --release -p gwenland-tui
        shell: bash

      # Expose the built binary on PATH for subsequent steps
      - name: Add gwen binary to PATH (Unix)
        if: runner.os != 'Windows'
        run: echo "${{ github.workspace }}/gwen-cli/target/release" >> $GITHUB_PATH

      - name: Add gwen binary to PATH (Windows)
        if: runner.os == 'Windows'
        run: |
          echo "${{ github.workspace }}\gwen-cli\target\release" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      # Verify binary is reachable
      - name: Smoke-test binary
        run: gwenland --version
        shell: bash

      # =========================================================================
      # Step 1 — gwen fetch
      # Fetches the TinyLlama 1.1B GGUF (q4_k_m quant) from HuggingFace.
      # --non-interactive + -q are required in CI (no TTY for quant selection).
      # =========================================================================
      - name: "[1/5] gwen fetch — download tinyllama/TinyLlama-1.1B q4_k_m"
        run: |
          gwenland --non-interactive --yes \
            fetch \
            -m tinyllama/TinyLlama-1.1B \
            -q q4_k_m
        shell: bash

      # =========================================================================
      # Step 2 — gwen dataset validate
      # Validates sample_100.jsonl structure, schema, and encoding.
      # --strict promotes warnings to errors for a hard CI gate.
      # =========================================================================
      - name: "[2/5] gwen dataset validate — tests/fixtures/sample_100.jsonl"
        run: |
          gwenland --non-interactive --yes \
            dataset validate \
            --input tests/fixtures/sample_100.jsonl \
            --strict
        shell: bash

      # =========================================================================
      # Step 3 — gwen scan dataset
      # Runs safety, PII, injection, bias, and balance checks on the fixture.
      # =========================================================================
      - name: "[3/5] gwen scan dataset — tests/fixtures/sample_100.jsonl"
        run: |
          gwenland --non-interactive --yes \
            scan dataset \
            --input tests/fixtures/sample_100.jsonl \
            --check safety,pii,injection,bias,balance
        shell: bash

      # =========================================================================
      # Step 4 — gwen train (dry-run, 5-step cap)
      # DANGER: --dry-run is mandatory. It runs pre-flight checks only;
      #         the training process is never launched.
      #
      # The 5-step cap is enforced structurally by --dry-run (no Python
      # subprocess is spawned). The ci_train_config.yaml sets epochs: 1
      # as a belt-and-suspenders guard if --dry-run is ever removed.
      # =========================================================================
      - name: "[4/5] gwen train — dry-run pre-flight (≤5 steps enforced)"
        run: |
          gwenland --non-interactive --yes --dry-run \
            train \
            --config tests/fixtures/ci_train_config.yaml \
            --model tinyllama/TinyLlama-1.1B \
            --dataset tests/fixtures/sample_100.jsonl \
            --output /tmp/gwen-ci-output \
            --verbose
        shell: bash

      # =========================================================================
      # Step 5 — gwen hub model push (dry-run)
      # Validates Hub auth and pre-flight conditions without uploading anything.
      # The global --dry-run flag is passed; push pre-flight checks token
      # availability and path existence.
      #
      # NOTE: gwen hub model push requires <model_id> and <path> positionals.
      #       We target a scoped repo name so any accidental live push would
      #       fail on permissions (not silently succeed).
      #
      # If HF_TOKEN secret is not configured, this step exits non-zero and
      # the workflow fails — this is intentional; the secret is required.
      # =========================================================================
      - name: "[5/5] gwen hub model push — dry-run auth + pre-flight check"
        run: |
          gwenland --non-interactive --yes --dry-run \
            hub push \
            ci-gwen-test/tinyllama-1.1b-ci \
            /tmp/gwen-ci-output
        shell: bash
